name: Pull Request Verification

on:
  pull_request:
    branches: [ "master", "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    name: 🔍 Validate Pull Request
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, mysql, bcmath, gd, intl
        coverage: none

    - name: Install Composer Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Generate Application Key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Run Linting Checks (Pint)
      run: ./vendor/bin/pint --test

    - name: Execute PHPUnit Tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: ":memory:"
      run: php artisan test

    - name: Notify on PR Failure (Email)
      if: failure()
      run: |
        curl -X POST https://api.resend.com/emails \
          -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{
            "from": "noreply@channelmarket.net",
            "to": ["elfridayemadje5@gmail.com", "digitaleflex@gmail.com"],
            "subject": "❌ PR REJETÉE - Échec des Tests - Channel Market",
            "html": "<h3>Attention !</h3><p>La Pull Request <b>#${{ github.event.pull_request.number }} : ${{ github.event.pull_request.title }}</b> ne peut pas être fusionnée car les tests de qualité ont échoué.</p><p><b>Auteur de la PR :</b> ${{ github.event.pull_request.user.login }}</p><p><b>Branche source :</b> ${{ github.event.pull_request.head.ref }}</p><p><b>Branche cible :</b> ${{ github.event.pull_request.base.ref }}</p><p><a href=\"${{ github.server_url }}/${{ github.repository }}/actions\">Voir les logs d erreur sur GitHub</a></p>"
          }'

    - name: Notify on PR Success (Email)
      if: success()
      run: |
        curl -X POST https://api.resend.com/emails \
          -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{
            "from": "noreply@channelmarket.net",
            "to": ["elfridayemadje5@gmail.com", "digitaleflex@gmail.com"],
            "subject": "✅ PR VALIDÉE - Prête pour Fusion - Channel Market",
            "html": "<h3>Bonne nouvelle !</h3><p>La Pull Request <b>#${{ github.event.pull_request.number }} : ${{ github.event.pull_request.title }}</b> a passé tous les tests de qualité avec succès !</p><p>Elle est maintenant <b>prête à être fusionnée</b> vers la branche <b>${{ github.event.pull_request.base.ref }}</b> en toute sécurité.</p><p><b>Auteur de la PR :</b> ${{ github.event.pull_request.user.login }}</p><p><a href=\"${{ github.event.pull_request.html_url }}\">Ouvrir la Pull Request pour fusionner</a></p>"
          }'
