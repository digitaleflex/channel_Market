name: CI/CD & Deployment

on:
  push:
    branches: [ "master", "main" ]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: 🧪 Run Tests & Code Quality
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, mysql, bcmath, gd, intl
        coverage: none

    - name: Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: vendor
        key: composer-${{ hashFiles('composer.lock') }}
        restore-keys: composer-

    - name: Install Composer Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Generate Application Key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install NPM dependencies
      run: npm ci

    - name: Build assets
      run: npm run build

    - name: Execute PHPUnit Tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: ":memory:"
      run: php artisan test

    - name: Notify on CI Failure (Email)
      if: failure()
      run: |
        curl -X POST https://api.resend.com/emails \
          -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{
            "from": "noreply@channelmarket.net",
            "to": ["elfridayemadje5@gmail.com", "digitaleflex@gmail.com", "${{ github.event.head_commit.author.email }}"],
            "subject": "🚨 ÉCHEC des Tests - Déploiement Annulé",
            "html": "<h3>Attention !</h3><p>Le déploiement de <b>Channel Market</b> a été <b>annulé</b> car les tests automatisés ont échoué.</p><p><b>Auteur :</b> ${{ github.event.head_commit.author.name }} (${{ github.event.head_commit.author.email }})</p><p><b>Commit :</b> ${{ github.event.head_commit.message }}</p><p><b>Branche :</b> ${{ github.ref_name }}</p><p><a href=\"${{ github.server_url }}/${{ github.repository }}/actions\">Voir les détails</a></p>"
          }'

  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test]
    environment: production
    steps:
    - name: Notify Webhook - Deployment Started
      run: |
        curl -X POST "https://channelmarket.net/webhook/deploy" \
          -H "Content-Type: application/json" \
          -H "X-Deploy-Token: faa82cf54d512bf07b72e29d3501ff24" \
          -d '{"commit_sha":"${{ github.sha }}", "commit_message":"${{ github.event.head_commit.message }}", "status":"deploying"}' || true # gitleaks:allow

    - name: Vérification connectivité VPS
      run: |
        echo "Vérification du port SSH..."
        nc -zv -w 5 ${{ secrets.VPS_HOST }} ${{ secrets.VPS_SSH_PORT || 22 }} || echo "ERREUR : Port SSH inaccessible"

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_SSH_PORT || 22 }}
        timeout: 120s
        script: |
          mkdir -p ${{ secrets.VPS_PATH }}
          cd ${{ secrets.VPS_PATH }}

          PREVIOUS_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "")
          echo "Commit stable précédent : $PREVIOUS_COMMIT"

          if [ ! -d ".git" ]; then
            echo "Premier déploiement : clonage..."
            git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
            git remote set-url origin https://github.com/${{ github.repository }}.git
          else
            echo "Mise à jour vers ${{ github.ref_name }}..."
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
          fi

          echo "Validation des variables d'environnement..."
          MISSING_VARS=""
          for VAR in APP_KEY APP_URL DB_HOST DB_DATABASE DB_PASSWORD; do
            if ! grep -q "^$VAR=" .env 2>/dev/null || [ -z "$(grep "^$VAR=" .env | cut -d'=' -f2)" ]; then
              MISSING_VARS="$MISSING_VARS $VAR"
            fi
          done
          if [ -n "$MISSING_VARS" ]; then
            echo "ERREUR : Variables manquantes dans .env :$MISSING_VARS"
            exit 1
          fi
          echo "Variables d'environnement OK."

          echo "Vérification des migrations en attente..."
          PENDING=$(docker compose exec -T app php artisan migrate:status 2>/dev/null | grep "Pending" || true)
          if [ -n "$PENDING" ]; then
            echo "Migrations en attente détectées :"
            echo "$PENDING"
          else
            echo "Aucune migration en attente."
          fi

          echo "Build et redémarrage sans interruption de service..."
          if ! DOCKER_BUILDKIT=1 docker compose up -d --build --remove-orphans; then
            echo "ERREUR : Échec du build Docker. Rollback vers $PREVIOUS_COMMIT..."
            if [ -n "$PREVIOUS_COMMIT" ]; then
              git reset --hard $PREVIOUS_COMMIT
              DOCKER_BUILDKIT=1 docker compose up -d --build --remove-orphans
            fi
            exit 1
          fi

          echo "Extraction des assets compilés (CSS/JS)..."
          APP_CONTAINER=$(docker compose ps -q app)
          if [ -z "$APP_CONTAINER" ]; then
            echo "ERREUR : Conteneur app introuvable."
            exit 1
          fi
          if ! docker exec "$APP_CONTAINER" test -f /var/build/manifest.json; then
            echo "ERREUR : /var/build/manifest.json absent. Le build Vite a échoué."
            exit 1
          fi
          rm -rf ./public/build
          docker cp "$APP_CONTAINER":/var/build ./public/
          chmod -R 755 public/build
          if [ ! -f ./public/build/manifest.json ]; then
            echo "ERREUR : Copie des assets échouée."
            exit 1
          fi
          echo "Assets copiés avec succès."

          docker compose exec -T --user root app mkdir -p storage/framework/views storage/framework/cache storage/framework/sessions bootstrap/cache
          docker compose exec -T --user root app chmod -R 777 storage bootstrap/cache
          docker compose exec -T --user root app chown -R www-data:www-data storage bootstrap/cache

          docker compose exec -T app php artisan storage:link --force
          docker compose exec -T app php artisan migrate --force
          docker compose exec -T app php artisan config:cache
          docker compose exec -T app php artisan route:cache
          docker compose exec -T app php artisan view:cache

          docker image prune -f

          echo "Smoke tests (vérification des routes critiques)..."
          FAILED_ROUTES=""
          for ROUTE in "/" "/health" "/login"; do
            for i in $(seq 1 12); do
              STATUS=$(curl -o /dev/null -s -w "%{http_code}" "https://channelmarket.net$ROUTE")
              if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 302 ]; then
                echo "✅ $ROUTE → HTTP $STATUS"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "🚨 $ROUTE → HTTP $STATUS après 60s"
                FAILED_ROUTES="$FAILED_ROUTES $ROUTE"
              else
                sleep 5
              fi
            done
          done

          if [ -n "$FAILED_ROUTES" ]; then
            echo "ERREUR CRITIQUE : Routes en échec :$FAILED_ROUTES. Rollback..."
            if [ -n "$PREVIOUS_COMMIT" ]; then
              git reset --hard $PREVIOUS_COMMIT
              DOCKER_BUILDKIT=1 docker compose up -d --build --remove-orphans
              echo "Rollback effectué vers $PREVIOUS_COMMIT."
            fi
            exit 1
          fi

          echo "✅ Tous les smoke tests passés."

          echo "Surveillance des logs Laravel (30s)..."
          sleep 30
          ERROR_COUNT=$(docker compose exec -T app tail -n 100 storage/logs/laravel.log 2>/dev/null | grep -c "\[ERROR\]\|\[CRITICAL\]" || echo "0")
          if [ "$ERROR_COUNT" -gt 5 ]; then
            echo "🚨 ALERTE : $ERROR_COUNT erreurs critiques détectées dans les logs après deploy. Rollback..."
            if [ -n "$PREVIOUS_COMMIT" ]; then
              git reset --hard $PREVIOUS_COMMIT
              DOCKER_BUILDKIT=1 docker compose up -d --build --remove-orphans
            fi
            exit 1
          fi
          echo "✅ Logs OK ($ERROR_COUNT erreurs). Déploiement terminé."

    - name: Notification Succès (Email & Webhook)
      if: success()
      run: |
        curl -X POST "https://channelmarket.net/webhook/deploy" \
          -H "Content-Type: application/json" \
          -H "X-Deploy-Token: faa82cf54d512bf07b72e29d3501ff24" \
          -d '{"commit_sha":"${{ github.sha }}", "status":"success"}' || true # gitleaks:allow

        curl -X POST https://api.resend.com/emails \
          -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{
            "from": "noreply@channelmarket.net",
            "to": ["elfridayemadje5@gmail.com", "digitaleflex@gmail.com", "${{ github.event.head_commit.author.email }}"],
            "subject": "✅ Déploiement RÉUSSI - Channel Market",
            "html": "<h3>Félicitations !</h3><p>Le déploiement de <b>Channel Market</b> sur le VPS s est déroulé avec succès.</p><p><b>Version :</b> ${{ github.sha }}</p><p><b>Auteur :</b> ${{ github.event.head_commit.author.name }}</p><p><b>Branche :</b> ${{ github.ref_name }}</p><p><a href=\"https://channelmarket.net\">Accéder au site</a></p>"
          }'

    - name: Notification Échec du Déploiement (Email & Webhook)
      if: failure()
      run: |
        curl -X POST "https://channelmarket.net/webhook/deploy" \
          -H "Content-Type: application/json" \
          -H "X-Deploy-Token: faa82cf54d512bf07b72e29d3501ff24" \
          -d '{"commit_sha":"${{ github.sha }}", "status":"failed"}' || true # gitleaks:allow

        curl -X POST https://api.resend.com/emails \
          -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{
            "from": "noreply@channelmarket.net",
            "to": ["elfridayemadje5@gmail.com", "digitaleflex@gmail.com", "${{ github.event.head_commit.author.email }}"],
            "subject": "🚨 ERREUR de Déploiement - Channel Market",
            "html": "<h3>Attention !</h3><p>Le déploiement de <b>Channel Market</b> a échoué. Le rollback automatique a été exécuté.</p><p><b>Auteur :</b> ${{ github.event.head_commit.author.name }}</p><p><b>Branche :</b> ${{ github.ref_name }}</p><p><a href=\"${{ github.server_url }}/${{ github.repository }}/actions\">Voir les logs</a></p>"
          }'
