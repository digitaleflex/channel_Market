name: Weekly Activity Report

on:
  schedule:
    - cron: '0 18 * * 0' # Tous les dimanches à 18h
  workflow_dispatch:

jobs:
  activity-report:
    runs-on: ubuntu-latest
    steps:
    - name: Collect System Info and Send Report
      uses: appleboy/ssh-action@v1.0.3
      env:
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_SSH_PORT || 22 }}
        envs: RESEND_API_KEY
        script: |
          cd ${{ secrets.VPS_PATH }}

          # --- Collecte des données réelles ---
          DISK=$(df -h / | awk 'NR==2 {print "Utilisé : "$3" / "$2" ("$5")"}')
          MEM=$(free -m | awk 'NR==2 {printf "Utilisé : %sMB / %sMB (%.0f%%)", $3, $2, $3/$2*100}')
          CONTAINERS=$(docker compose ps --format "table {{.Name}}\t{{.Status}}" 2>/dev/null | tail -n +2)
          LARAVEL_ERRORS=$(docker compose exec -T app tail -n 30 storage/logs/laravel.log 2>/dev/null | grep -E "\[ERROR\]|\[CRITICAL\]|Exception" | tail -5 || echo "Aucune erreur critique.")
          UPTIME=$(uptime -p)
          CURRENT_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "inconnu")
          SITE_STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://channelmarket.net)

          # --- Construction du HTML ---
          HTML="<h2>📊 Rapport Hebdomadaire — Channel Market</h2>"
          HTML="$HTML<p><b>Date :</b> $(date '+%d/%m/%Y à %H:%M')</p>"
          HTML="$HTML<hr>"

          HTML="$HTML<h3>🖥️ Serveur</h3>"
          HTML="$HTML<p><b>Uptime :</b> $UPTIME</p>"
          HTML="$HTML<p><b>Disque :</b> $DISK</p>"
          HTML="$HTML<p><b>Mémoire :</b> $MEM</p>"
          HTML="$HTML<p><b>Commit en prod :</b> $CURRENT_COMMIT</p>"

          if [ "$SITE_STATUS" -eq 200 ] || [ "$SITE_STATUS" -eq 302 ]; then
            HTML="$HTML<p><b>Site :</b> ✅ Opérationnel (HTTP $SITE_STATUS)</p>"
          else
            HTML="$HTML<p><b>Site :</b> 🚨 Problème détecté (HTTP $SITE_STATUS)</p>"
          fi

          HTML="$HTML<hr><h3>🐳 Conteneurs Docker</h3>"
          HTML="$HTML<pre>$CONTAINERS</pre>"

          HTML="$HTML<hr><h3>⚠️ Erreurs Laravel récentes</h3>"
          HTML="$HTML<pre>$LARAVEL_ERRORS</pre>"

          HTML="$HTML<hr><p><a href='https://channelmarket.net'>Accéder au site</a> | <a href='https://github.com/${{ github.repository }}/actions'>GitHub Actions</a></p>"

          # --- Envoi de l'email ---
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"monitoring@channelmarket.net\",
              \"to\": [\"elfridayemadje5@gmail.com\", \"digitaleflex@gmail.com\"],
              \"subject\": \"📊 Rapport Hebdomadaire — Channel Market\",
              \"html\": \"$HTML\"
            }"

          echo "Rapport envoyé avec succès."
